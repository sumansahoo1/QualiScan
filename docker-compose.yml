services:
  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - temp_data:/app/vision/temp
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  worker:
    build: .
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A vision.config.celery_worker.celery_app worker --loglevel=info
    volumes:
      - temp_data:/app/vision/temp
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data:
  temp_data:
